version: 1.0.0
name: libudev
description: udev / libudev — part of systemd. Verify-only; no install or config.
required_when:
  profiles: [minimal, standard]
optional_when:
  profiles: []
distro_packages:
  arch: []
  cachyos: []
service: null
config: null
permissions: null
verify:
  binary_paths: [/usr/bin/udevadm]
  version_cmd: ["udevadm", "--version"]
  version_regex: "(\\d+)"
  health_probe:
    kind: binary_exists_and_runs
post_install_hooks: []
rollback:
  remove_dropin: false
