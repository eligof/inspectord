name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install nightly Rust (for bpf-linker + aya-build)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - name: Install Rust toolchain (stable — default for cargo gates)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install LLVM + libelf + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              llvm-18 llvm-18-dev libpolly-18-dev \
              clang-18 lld-18 libelf-dev pkg-config

      - name: Configure LLVM env
        run: |
          echo "LLVM_SYS_180_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "/usr/lib/llvm-18/bin" >> $GITHUB_PATH

      - name: Install bpf-linker
        run: cargo install --locked bpf-linker

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          pip install -e '.[dev]' --no-build-isolation

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --exclude inspectord_native_bpf -- -D warnings

      - name: Cargo build
        run: cargo build --workspace --all-targets --exclude inspectord_native_bpf

      - name: Cargo test
        run: cargo test --workspace --all-targets --exclude inspectord_native_bpf

      - name: Cargo build BPF crate
        working-directory: crates/inspectord_native_bpf
        run: cargo build --release --target bpfel-unknown-none

      - name: Ruff check
        run: |
          if compgen -G "inspectord" > /dev/null || compgen -G "inspectorctl" > /dev/null || compgen -G "tests" > /dev/null; then
            paths=()
            [ -d inspectord ] && paths+=(inspectord)
            [ -d inspectorctl ] && paths+=(inspectorctl)
            [ -d tests ] && paths+=(tests)
            ruff check "${paths[@]}"
          else
            echo "No Python source dirs yet — skipping ruff check (Task 2.5 initial state)."
          fi

      - name: Ruff format check
        run: |
          paths=()
          [ -d inspectord ] && paths+=(inspectord)
          [ -d inspectorctl ] && paths+=(inspectorctl)
          [ -d tests ] && paths+=(tests)
          if [ ${#paths[@]} -gt 0 ]; then
            ruff format --check "${paths[@]}"
          else
            echo "No Python source dirs yet — skipping ruff format check."
          fi

      - name: Mypy
        run: |
          paths=()
          [ -d inspectord ] && paths+=(inspectord)
          [ -d inspectorctl ] && paths+=(inspectorctl)
          if [ ${#paths[@]} -gt 0 ]; then
            mypy "${paths[@]}"
          else
            echo "No Python source dirs yet — skipping mypy."
          fi

      - name: Pytest (unit)
        run: |
          if [ -d tests ]; then
            pytest -m "not integration and not ebpf_load" -v || [ $? -eq 5 ]
          else
            echo "No tests/ dir yet — skipping unit tests."
          fi

      - name: Pytest (integration)
        run: |
          if [ -d tests/integration ]; then
            pytest -m "integration and not ebpf_load" -v || [ $? -eq 5 ]
          else
            echo "No tests/integration dir yet — skipping integration tests."
          fi
